name: Scrape Table Sums

on:
  push:
    branches: [main]
  workflow_dispatch:  # This lets you run it manually too

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 21f2000170@ds.study.iitm.ac.in - Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Playwright scraper
        run: node scrape.js
